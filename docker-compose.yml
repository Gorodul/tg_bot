version: '3.8'

services:
  bot:
    build: .
    restart: always          # Автоматически перезапускается при сбое или ребуте сервера
    env_file:
      - .env                 # Читаем токен и другие секреты из .env файла
    volumes:
      - ./data:/app/data     # Сохраняем локальные данные (если нужно)
